<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; }
        
        #intro {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            background: #000; z-index: 999;
        }

        .logo {
            width: 300px;
            /* A mágica: animação customizada (cubic-bezier) que dá o peso de cinema */
            animation: cinematic 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cinematic {
            0% { opacity: 0; transform: scale(0.8) translateZ(0); filter: blur(20px); }
            30% { opacity: 1; filter: blur(0px); }
            100% { transform: scale(1) translateZ(0); }
        }

        /* O brilho sutil estilo Netflix/HBO */
        .reveal {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="intro">
        <div class="reveal"></div>
        <img src="https://i.postimg.cc/NLqy8v05/IMG-2741.png" class="logo">
    </div>

    <script>
        // Use um som de "Sub-Boom" ou "Cinematic Hit"
        const sound = new Audio('hit.mp3');
        
        window.onload = () => {
            // O segredo do profissionalismo: disparar o som exatamente no início
            sound.play();

            // Transição de estúdio (Fade para conteúdo)
            setTimeout(() => {
                document.getElementById('intro').style.transition = "opacity 0.8s ease-in-out";
                document.getElementById('intro').style.opacity = "0";
            }, 2500);
        };
    </script>
</body>
</html>
