<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #intro { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 999; background: #000; }
        
        .logo-wrapper { position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo { width: 350px; opacity: 0; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2)); }
        
        /* Luz de fundo */
        .aura { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%); opacity: 0; }
        
        /* O Feixe de luz diagonal */
        .sweep {
            position: absolute; top: -50%; left: -100%; width: 50%; height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
            transform: rotate(25deg);
            opacity: 0;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="intro">
        <div class="aura"></div>
        <div class="logo-wrapper">
            <div class="sweep"></div>
            <img src="https://i.postimg.cc/NLqy8v05/IMG-2741.png" class="logo">
        </div>
    </div>

    <script>
        const tl = gsap.timeline();

        // 1. Aura e Logo
        tl.to(".aura", { opacity: 1, duration: 2, ease: "power2.inOut" })
          .fromTo(".logo", 
            { scale: 0.8, opacity: 0, filter: "blur(20px)" },
            { scale: 1, opacity: 1, filter: "blur(0px)", duration: 2.5, ease: "power4.out" }, "-=1.5")
          
          // 2. O Feixe de luz (Sweep) passando pela logo
          .to(".sweep", { 
            opacity: 0.5, 
            left: "150%", 
            duration: 1.2, 
            ease: "power2.inOut" 
          }, "-=1.8"); // Inicia um pouco antes da logo terminar de subir

        // Som cinematográfico
        const boom = new Audio('https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg');
        boom.play();

        // Saída cinematográfica
        setTimeout(() => {
            gsap.to("#intro", { opacity: 0, duration: 1.5, ease: "power2.in" });
        }, 3000);
    </script>
</body>
</html>
