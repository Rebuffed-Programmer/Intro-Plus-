<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #intro { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 999; background: #000; }
        
        .logo-wrapper { position: relative; display: flex; align-items: center; justify-content: center; }
        .logo { width: 350px; opacity: 0; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2)); z-index: 2; }
        .aura { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%); opacity: 0; }
        
        /* CONTAINER DE FEIXES */
        .beams-container { position: absolute; inset: 0; pointer-events: none; z-index: 1000; }
        .beam {
            position: absolute; width: 15%; height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: rotate(-25deg);
            top: -50%; opacity: 0;
        }
    </style>
</head>
<body>

    <div id="intro">
        <div class="beams-container">
            <div class="beam" id="b1"></div>
            <div class="beam" id="b2"></div>
            <div class="beam" id="b3"></div>
        </div>
        <div class="aura"></div>
        <div class="logo-wrapper">
            <img src="https://i.postimg.cc/NLqy8v05/IMG-2741.png" class="logo">
        </div>
    </div>

    <script>
        const tl = gsap.timeline();

        // Animação dos 3 feixes em sequência
        tl.to("#b1", { left: "120%", opacity: 0.8, duration: 2, ease: "power2.inOut" })
          .to("#b2", { left: "140%", opacity: 0.6, duration: 2.2, ease: "power2.inOut" }, "-=1.8")
          .to("#b3", { left: "160%", opacity: 0.4, duration: 2.5, ease: "power2.inOut" }, "-=2.0")
          
          // Animação Logo e Aura
          .to(".aura", { opacity: 1, duration: 2, ease: "power2.inOut" }, "-=2.5")
          .fromTo(".logo", 
            { scale: 0.8, opacity: 0, filter: "blur(20px)" },
            { scale: 1, opacity: 1, filter: "blur(0px)", duration: 2.5, ease: "power4.out" }, "-=2.0");

        const boom = new Audio('https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg');
        boom.play();

        setTimeout(() => {
            gsap.to("#intro", { opacity: 0, duration: 1.5, ease: "power2.in" });
        }, 3000);
    </script>
</body>
</html>
