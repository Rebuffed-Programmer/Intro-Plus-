<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Intro Plus+</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }

        #intro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }

        .logo { 
            width: 320px; opacity: 0;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
            animation: fadeInLogo 2s ease forwards 0.5s;
        }

        .shine {
            position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-20deg);
            animation: shineEffect 1.5s linear forwards 2s;
        }

        .noise {
            position: absolute; width: 100%; height: 100%; opacity: 0.05;
            background-image: repeating-radial-gradient(circle, rgba(255,255,255,0.1) 0, transparent 2px);
            pointer-events: none;
        }

        @keyframes fadeInLogo { 
            0% { opacity: 0; transform: scale(0.95); } 
            100% { opacity: 1; transform: scale(1); } 
        }
        @keyframes shineEffect { 0% { left: -100%; } 100% { left: 150%; } }

        #app { color: white; display: flex; justify-content: center; align-items: center; height: 100vh; opacity: 0; transition: opacity 1s; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="noise"></div>
        <div style="position:relative;">
            <img src="https://i.postimg.cc/NLqy8v05/IMG-2741.png" class="logo">
            <div class="shine"></div>
        </div>
    </div>

    <div id="app"><h1>Bem-vindo ao App</h1></div>

    <script>
        // Carregar áudios (substitua pelos seus arquivos .mp3)
        const snap = new Audio('snap.mp3'); 

        window.onload = () => {
            // Toca o som do "Snap" no momento em que a logo aparece (0.5s)
            setTimeout(() => { snap.play(); }, 500);

            // Transição para o App
            setTimeout(() => {
                document.getElementById("intro").style.opacity = "0";
                setTimeout(() => {
                    document.getElementById("intro").remove();
                    document.getElementById("app").style.opacity = "1";
                }, 1000);
            }, 3500);
        };
    </script>
</body>
</html>
