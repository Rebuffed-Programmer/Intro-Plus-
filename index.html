<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .container { position: relative; width: 350px; }
        
        .logo { width: 100%; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        
        /* O "Feixe" de luz */
        .sweep {
            position: absolute; top: -50%; left: -100%;
            width: 50%; height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: rotate(25deg);
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- O feixe passa por cima -->
        <div class="sweep"></div>
        <img src="https://i.postimg.cc/NLqy8v05/IMG-2741.png" class="logo">
    </div>

    <script>
        const tl = gsap.timeline();

        // 1. Surgimento da logo (Netflix Style)
        tl.fromTo(".logo", 
            { opacity: 0, scale: 0.9, filter: "blur(15px)" },
            { opacity: 1, scale: 1, filter: "blur(0px)", duration: 2, ease: "power4.out" }
        )
        // 2. O feixe de luz passando (Hulu/HBO Style)
        .to(".sweep", { 
            opacity: 0.6, 
            left: "150%", 
            duration: 1.2, 
            ease: "power2.inOut" 
        }, "-=1.5");

        // Som cinematográfico (substitua pelo seu arquivo .mp3)
        // const audio = new Audio('seu-som-cinematico.mp3');
        // audio.play();
    </script>
</body>
</html>
